name: Deploy Cortex

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  typecheck:
    name: Typecheck package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

  deploy-server:
    name: Deploy server (Render)
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK"
          else
            echo "RENDER_DEPLOY_HOOK not set — Render auto-deploys from render.yaml"
          fi
