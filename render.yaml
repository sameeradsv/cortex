# Connect at https://dashboard.render.com → New → Blueprint
# After deploy, set DATABASE_URL manually in the Render dashboard:
#   DATABASE_URL  — Neon PostgreSQL connection string (neon.tech)
services:
  - type: web
    name: cortex-auth
    runtime: python
    plan: free
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://sameeradsv.github.io
      - key: PYTHON_VERSION
        value: "3.12"
